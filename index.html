<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Keuangan KWT</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        :root { --primary-green: #2e7d32; --light-green: #e8f5e9; --accent-yellow: #fbc02d; --bg-body: #f5f7f9; }
        body { background-color: var(--bg-body); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .bg-gradient-green { background: linear-gradient(135deg, #1b5e20, #2e7d32); color: white; }
        .btn-custom-green { background-color: var(--primary-green); color: white; border-radius: 10px; font-weight: 500;}
        .btn-custom-green:hover { background-color: #1b5e20; color: white;}
        .form-control, .form-select { border-radius: 10px; border: 1px solid #dee2e6; padding: 10px 15px;}
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; box-shadow: 0 -5px 20px rgba(0,0,0,0.08); display: flex; justify-content: space-around; padding: 12px 0 15px 0; z-index: 1000; border-top-left-radius: 25px; border-top-right-radius: 25px; }
        .nav-item { text-align: center; color: #95a5a6; cursor: pointer; font-size: 0.8rem; font-weight: 500; transition: 0.3s;}
        .nav-item i { display: block; font-size: 1.3rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary-green); transform: translateY(-3px);}
        #app-container { margin-bottom: 90px; display: none; }
        .view-section { display: none; animation: fadeIn 0.4s; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #login-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--light-green); }
        .login-card { max-width: 380px; width: 90%; padding: 40px 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(46, 125, 50, 0.15); }
        .nav-pills .nav-link { border-radius: 10px; color: #555; }
        .nav-pills .nav-link.active { background-color: var(--primary-green); color: white; }
        .rupiah::before { content: "Rp "; }
        #global-loader { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; display: none; backdrop-filter: blur(2px);}
        .btn-delete-sm { color: #e74c3c; cursor: pointer; padding: 5px 10px; border-radius: 5px; transition: 0.2s; background: none; border: none;}
        .btn-delete-sm:hover { background-color: #ffebee; }
    </style>
</head>
<body>

    <div id="global-loader">
        <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
        <h5 class="mt-3 text-success fw-bold">Memproses Data...</h5>
    </div>

    <!-- PORTAL LOGIN -->
    <div id="login-container">
        <div class="card login-card text-center bg-white">
            <h2 class="text-success mb-1"><i class="fa-solid fa-seedling"></i></h2>
            <h4 class="mb-4" style="color: #2e7d32; font-weight: bold;">KWT Proklim</h4>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-3 text-start"><input type="text" id="username" class="form-control" required placeholder="Username"></div>
                <div class="mb-4 text-start"><input type="password" id="password" class="form-control" required placeholder="Password"></div>
                <button type="submit" class="btn btn-custom-green w-100 py-2" id="btnLogin">Login</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-container">
        <div class="bg-gradient-green p-4 text-center" style="border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);">
            <h4 class="mb-1 mt-2 fw-bold">Sistem Keuangan</h4>
            <p class="mb-0" style="font-size: 0.9rem; color: #c8e6c9;">Kelompok Wanita Tani</p>
        </div>

        <div class="container mt-4">
            
            <!-- DASHBOARD VIEW -->
            <div id="view-dashboard" class="view-section active">
                <button onclick="downloadPDF()" class="btn btn-dark w-100 mb-4 py-2" style="border-radius: 12px; font-weight: 500; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
                    <i class="fa-solid fa-file-pdf text-danger me-2"></i> Download Laporan Keuangan (PDF)
                </button>

                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <div class="card bg-white p-3 border-top border-success border-4 text-center h-100">
                            <h6 class="text-muted mb-2" style="font-size: 0.8rem;">Saldo Kas Total</h6>
                            <h4 id="dash-saldo-kas" class="text-success fw-bold rupiah mb-0">0</h4>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card bg-white p-3 border-top border-warning border-4 text-center h-100">
                            <h6 class="text-muted mb-2" style="font-size: 0.8rem;">Dana Darurat</h6>
                            <h4 id="dash-saldo-darurat" class="text-warning fw-bold rupiah mb-0">0</h4>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3 mt-4">
                    <h6 class="fw-bold text-secondary mb-0"><i class="fa-solid fa-chart-pie me-2"></i>Rekapitulasi Kas</h6>
                    <select id="filter-periode" class="form-select form-select-sm w-auto shadow-sm" onchange="filterDashboard()">
                        <option value="semua">Semua Waktu</option><option value="harian">Hari Ini</option>
                        <option value="bulanan">Bulan Ini</option><option value="tahunan">Tahun Ini</option>
                    </select>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6"><div class="card bg-white p-2 border-start border-success border-4 shadow-sm text-center"><small class="text-muted" style="font-size: 0.7rem;">Pemasukan <span id="label-pem">Semua</span></small><h6 id="filter-pemasukan" class="text-success fw-bold rupiah mb-0 mt-1">0</h6></div></div>
                    <div class="col-6"><div class="card bg-white p-2 border-start border-danger border-4 shadow-sm text-center"><small class="text-muted" style="font-size: 0.7rem;">Pengeluaran <span id="label-peng">Semua</span></small><h6 id="filter-pengeluaran" class="text-danger fw-bold rupiah mb-0 mt-1">0</h6></div></div>
                </div>

                <div class="card mb-4 p-3 shadow-sm"><div class="chart-container" style="position: relative; height: 200px; width: 100%;"><canvas id="kasChart"></canvas></div></div>

                <div class="card mb-4 p-3 shadow-sm">
                    <h6 class="fw-bold mb-3 text-secondary border-bottom pb-2"><i class="fa-solid fa-clock-rotate-left me-2"></i>Aktivitas Sistem Terkini</h6>
                    <div id="dashboard-history" class="list-group list-group-flush"></div>
                </div>
            </div>

            <!-- ARUS KAS VIEW -->
            <div id="view-aruskas" class="view-section">
                <h5 class="fw-bold text-success mb-3"><i class="fa-solid fa-book-journal-whills"></i> Buku Arus Kas</h5>
                <ul class="nav nav-pills nav-fill mb-3"><li class="nav-item-tab"><button class="nav-link active w-100" data-bs-toggle="pill" data-bs-target="#kas-input">Input Data</button></li><li class="nav-item-tab ms-2"><button class="nav-link w-100" data-bs-toggle="pill" data-bs-target="#kas-riwayat">Riwayat</button></li></ul>
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="kas-input">
                        <div class="card p-3">
                            <form id="formArusKas" onsubmit="submitArusKas(event)">
                                <div class="mb-3"><label class="form-label text-muted small">Tanggal</label><input type="date" id="ak_tanggal" class="form-control" required></div>
                                <div class="mb-3"><label class="form-label text-muted small">Jenis</label><select id="ak_jenis" class="form-select" required onchange="updateKategoriKas()"><option value="Pemasukan">Pemasukan (+)</option><option value="Pengeluaran">Pengeluaran (-)</option></select></div>
                                <div class="mb-3"><label class="form-label text-muted small">Kategori</label><select id="ak_kategori" class="form-select" required></select></div>
                                <div class="mb-3"><label class="form-label text-muted small">Keterangan</label><input type="text" id="ak_keterangan" class="form-control" required></div>
                                <div class="mb-4"><label class="form-label text-muted small">Nominal (Rp)</label><input type="number" id="ak_nominal" class="form-control fw-bold" required min="1"></div>
                                <button type="submit" class="btn btn-custom-green w-100 py-2">Simpan ke Buku Kas</button>
                            </form>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="kas-riwayat"><div class="card p-0"><div class="list-group list-group-flush" id="list-riwayat-kas"></div></div></div>
                </div>
            </div>

            <!-- DANA DARURAT VIEW -->
            <div id="view-danadarurat" class="view-section">
                <h5 class="fw-bold text-warning mb-3"><i class="fa-solid fa-piggy-bank"></i> Kelola Dana Darurat</h5>
                <ul class="nav nav-pills nav-fill mb-3"><li class="nav-item-tab"><button class="nav-link active w-100" data-bs-toggle="pill" data-bs-target="#darurat-input">Setor/Tarik</button></li><li class="nav-item-tab ms-2"><button class="nav-link w-100" data-bs-toggle="pill" data-bs-target="#darurat-riwayat">Riwayat</button></li></ul>
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="darurat-input">
                        <div class="card p-3 border-warning border-opacity-50">
                            <form id="formDanaDarurat" onsubmit="submitDanaDarurat(event)">
                                <div class="mb-3"><label class="form-label text-muted small">Tanggal</label><input type="date" id="dd_tanggal" class="form-control" required></div>
                                <div class="mb-3"><label class="form-label text-muted small">Aksi</label><select id="dd_jenis" class="form-select" required><option value="Setor">Setor Dana (+)</option><option value="Tarik">Tarik Dana (-)</option></select></div>
                                <div class="mb-3"><label class="form-label text-muted small">Tujuan/Alasan</label><input type="text" id="dd_keterangan" class="form-control" required></div>
                                <div class="mb-4"><label class="form-label text-muted small">Nominal (Rp)</label><input type="number" id="dd_nominal" class="form-control fw-bold" required min="1"></div>
                                <button type="submit" class="btn btn-warning w-100 py-2 fw-bold text-dark">Proses Dana</button>
                            </form>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="darurat-riwayat"><div class="card p-0"><div class="list-group list-group-flush" id="list-riwayat-darurat"></div></div></div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchView('dashboard', this)"><i class="fa-solid fa-chart-line"></i> Dashboard</div>
            <div class="nav-item" onclick="switchView('aruskas', this)"><i class="fa-solid fa-wallet"></i> Arus Kas</div>
            <div class="nav-item" onclick="switchView('danadarurat', this)"><i class="fa-solid fa-umbrella"></i> Darurat</div>
            <div class="nav-item text-danger" onclick="logout()"><i class="fa-solid fa-power-off"></i> Keluar</div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        // ==============================================================
        // GANTI DENGAN URL SCRIPT ANDA (DARI GOOGLE APPS SCRIPT)
        // ==============================================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPnMK4smtZe1T9JfbOXO8XUvqjBXZ5m_Vbaq6TtZEE3GvMtgjaWw--hplySgbBoDDS/exec';
        
        const formatRupiah = (angka) => new Intl.NumberFormat('id-ID').format(angka);
        let globalDataForPDF = null; let myChart = null;

        async function fetchAPI(action, params = {}) {
            const formData = new URLSearchParams(); formData.append('action', action);
            for (const key in params) formData.append(key, typeof params[key] === 'object' ? JSON.stringify(params[key]) : params[key]);
            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                return await response.json();
            } catch (error) { return { status: false, message: "Koneksi ke Server Terputus." }; }
        }

        window.onload = function() {
            if (sessionStorage.getItem('kwt_is_logged_in') === 'true') {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                syncData();
            }
            document.getElementById('ak_tanggal').valueAsDate = new Date();
            document.getElementById('dd_tanggal').valueAsDate = new Date();
            updateKategoriKas();
        };

        function showLoader() { document.getElementById('global-loader').style.display = 'flex'; }
        function hideLoader() { document.getElementById('global-loader').style.display = 'none'; }
        function logout() { sessionStorage.removeItem('kwt_is_logged_in'); location.reload(); }
        function switchView(viewName, element) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewName).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            if(viewName === 'dashboard') syncData();
        }

        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin'); btn.innerHTML = 'Memeriksa...'; btn.disabled = true;
            fetchAPI('login', { username: document.getElementById('username').value, password: document.getElementById('password').value }).then(res => {
                btn.innerHTML = 'Login'; btn.disabled = false;
                if (res.status) {
                    sessionStorage.setItem('kwt_is_logged_in', 'true');
                    Swal.fire({ icon: 'success', title: 'Login Berhasil', showConfirmButton: false, timer: 1000 });
                    document.getElementById('login-container').style.display = 'none'; document.getElementById('app-container').style.display = 'block';
                    syncData();
                } else Swal.fire({ icon: 'error', title: 'Gagal', text: res.message });
            });
        }

        function updateKategoriKas() {
            const select = document.getElementById('ak_kategori'); select.innerHTML = '';
            let options = document.getElementById('ak_jenis').value === 'Pemasukan' ? ['Penjualan Hasil Panen', 'Iuran Anggota', 'Hibah/Bantuan', 'Lain-lain'] : ['Pembelian Bibit/Pupuk', 'Operasional', 'Konsumsi', 'Perawatan', 'Lain-lain'];
            options.forEach(opt => select.appendChild(new Option(opt, opt)));
        }

        function submitArusKas(e) { e.preventDefault(); confirmSubmit('simpanArusKas', { tanggal: document.getElementById('ak_tanggal').value, jenis: document.getElementById('ak_jenis').value, kategori: document.getElementById('ak_kategori').value, keterangan: document.getElementById('ak_keterangan').value, nominal: document.getElementById('ak_nominal').value }, 'formArusKas'); }
        function submitDanaDarurat(e) { e.preventDefault(); confirmSubmit('simpanDanaDarurat', { tanggal: document.getElementById('dd_tanggal').value, jenis: document.getElementById('dd_jenis').value, keterangan: document.getElementById('dd_keterangan').value, nominal: document.getElementById('dd_nominal').value }, 'formDanaDarurat'); }
        function hapusData(id, tipe) {
            Swal.fire({ title: 'Hapus Riwayat?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#e74c3c', confirmButtonText: 'Ya, Hapus' }).then((r) => {
                if (r.isConfirmed) { showLoader(); fetchAPI('hapusTransaksi', { id: id, tipe: tipe }).then(res => { hideLoader(); if (res.status) { Swal.fire('Terhapus!', res.message, 'success'); syncData(); } else Swal.fire('Gagal', res.message, 'error'); }); }
            });
        }
        function confirmSubmit(action, data, formId) {
            Swal.fire({ title: 'Simpan Data?', icon: 'info', showCancelButton: true, confirmButtonColor: '#2e7d32', confirmButtonText: 'Ya, Simpan' }).then((r) => {
                if (r.isConfirmed) { showLoader(); fetchAPI(action, { data: data }).then(res => { hideLoader(); if (res.status) { Swal.fire('Tersimpan', '', 'success'); document.getElementById(formId).reset(); syncData(); } else Swal.fire('Error', res.message, 'error'); }); }
            });
        }

        function syncData() {
            fetchAPI('getAppData').then(data => {
                if(!data.status) return;
                globalDataForPDF = data;
                document.getElementById('dash-saldo-kas').innerText = formatRupiah(data.saldoKas);
                document.getElementById('dash-saldo-darurat').innerText = formatRupiah(data.saldoDarurat);
                filterDashboard(); 

                let htmlDash = '';
                data.riwayatGabungan.forEach(item => {
                    let isPlus = (item.jenis === 'Pemasukan' || item.jenis === 'Setor');
                    let colorClass = isPlus ? 'text-success' : 'text-danger';
                    htmlDash += `<div class="list-group-item px-0 py-2"><div class="d-flex justify-content-between align-items-center"><div><small class="text-muted d-block">${item.tipeSumber} • ${item.tanggal}</small><span class="fw-bold" style="font-size:0.95rem;">${item.keterangan}</span></div><span class="${colorClass} fw-bold">${isPlus?'+':'-'} Rp ${formatRupiah(item.nominal)}</span></div></div>`;
                });
                document.getElementById('dashboard-history').innerHTML = htmlDash;

                let htmlKas = ''; data.riwayatArusKas.forEach(item => { htmlKas += `<div class="list-group-item p-3"><div class="d-flex justify-content-between align-items-center"><div><small class="text-muted">${item.tanggal} • ${item.kategori}</small><h6 class="mb-0 fw-bold">${item.keterangan}</h6><h6 class="${item.jenis === 'Pemasukan' ? 'text-success' : 'text-danger'} fw-bold mb-0 mt-1">${item.jenis === 'Pemasukan' ? '+' : '-'} Rp ${formatRupiah(item.nominal)}</h6></div><button class="btn-delete-sm" onclick="hapusData('${item.id}', 'AK')"><i class="fa-solid fa-trash-can"></i></button></div></div>`; }); document.getElementById('list-riwayat-kas').innerHTML = htmlKas;
                let htmlDD = ''; data.riwayatDarurat.forEach(item => { htmlDD += `<div class="list-group-item p-3"><div class="d-flex justify-content-between align-items-center"><div><small class="text-muted">${item.tanggal} • ${item.jenis}</small><h6 class="mb-0 fw-bold">${item.keterangan}</h6><h6 class="${item.jenis === 'Setor' ? 'text-success' : 'text-danger'} fw-bold mb-0 mt-1">Rp ${formatRupiah(item.nominal)}</h6></div><button class="btn-delete-sm" onclick="hapusData('${item.id}', 'DD')"><i class="fa-solid fa-trash-can"></i></button></div></div>`; }); document.getElementById('list-riwayat-darurat').innerHTML = htmlDD;
            });
        }

        function filterDashboard() {
            if (!globalDataForPDF) return;
            const p = document.getElementById('filter-periode').value, now = new Date();
            let pem = 0, peng = 0, label = p === 'harian' ? 'Hari Ini' : (p === 'bulanan' ? 'Bulan Ini' : (p === 'tahunan' ? 'Tahun Ini' : 'Semua'));
            document.getElementById('label-pem').innerText = label; document.getElementById('label-peng').innerText = label;
            
            globalDataForPDF.riwayatArusKas.forEach(i => {
                const parts = i.tanggal.split('/'); const d = new Date(parts[2], parts[1]-1, parts[0]); let m = false;
                if(p==='semua') m=true; else if(p==='harian') m=(d.toDateString()===now.toDateString()); else if(p==='bulanan') m=(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()); else if(p==='tahunan') m=(d.getFullYear()===now.getFullYear());
                if(m) { if(i.jenis==='Pemasukan') pem+=i.nominal; if(i.jenis==='Pengeluaran') peng+=i.nominal; }
            });
            document.getElementById('filter-pemasukan').innerText = formatRupiah(pem); document.getElementById('filter-pengeluaran').innerText = formatRupiah(peng);
            renderChart(pem, peng);
        }

        function renderChart(pem, peng) {
            const ctx = document.getElementById('kasChart').getContext('2d');
            if(myChart) myChart.destroy();
            let d = [pem, peng], c = ['#2e7d32', '#e74c3c'];
            if(pem===0 && peng===0) { d=[1]; c=['#e0e0e0']; }
            myChart = new Chart(ctx, { type: 'doughnut', data: { labels: pem===0&&peng===0 ? ['Tidak Ada Data'] : ['Pemasukan', 'Pengeluaran'], datasets: [{ data: d, backgroundColor: c, borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } } });
        }

        function downloadPDF() {
            if(!globalDataForPDF) { Swal.fire('Tunggu', 'Data sedang dimuat...', 'info'); return; }
            Swal.fire({ title: 'Generate Laporan?', icon: 'info', showCancelButton: true, confirmButtonColor: '#2e7d32', confirmButtonText: 'PDF' }).then((result) => {
                if (result.isConfirmed) {
                    showLoader();
                    let barisKas = ''; [...globalDataForPDF.riwayatArusKas].reverse().forEach(item => { barisKas += `<tr><td>${item.tanggal}</td><td>${item.kategori}</td><td>${item.keterangan}</td><td style="text-align:right;">${item.jenis === 'Pemasukan' ? formatRupiah(item.nominal) : '-'}</td><td style="text-align:right;">${item.jenis === 'Pengeluaran' ? formatRupiah(item.nominal) : '-'}</td></tr>`; });
                    let barisDD = ''; [...globalDataForPDF.riwayatDarurat].reverse().forEach(item => { barisDD += `<tr><td>${item.tanggal}</td><td>${item.keterangan}</td><td style="text-align:right;">${item.jenis === 'Setor' ? formatRupiah(item.nominal) : '-'}</td><td style="text-align:right;">${item.jenis === 'Tarik' ? formatRupiah(item.nominal) : '-'}</td></tr>`; });
                    const html = `
                    <div style="font-family: Arial; padding: 20px;">
                        <h2 style="text-align:center; color:#2e7d32;">LAPORAN KEUANGAN KWT PROKLIM</h2>
                        <h4 style="border-bottom: 2px solid #2e7d32;">A. Saldo</h4>
                        <p>Kas: Rp ${formatRupiah(globalDataForPDF.saldoKas)} | Darurat: Rp ${formatRupiah(globalDataForPDF.saldoDarurat)}</p>
                        <h4 style="border-bottom: 2px solid #2e7d32;">B. Arus Kas</h4>
                        <table style="width:100%; border-collapse:collapse;"><thead><tr style="background:#eee;"><th>Tanggal</th><th>Kategori</th><th>Keterangan</th><th>Masuk</th><th>Keluar</th></tr></thead><tbody>${barisKas}</tbody></table>
                        <h4 style="border-bottom: 2px solid #2e7d32; margin-top:20px;">C. Dana Darurat</h4>
